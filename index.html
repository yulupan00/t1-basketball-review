<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Quality Review - Human Study</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="landing-container">
        <div class="landing-card">
            <div class="landing-header">
                <h1>Caption Quality Review</h1>
                <p class="subtitle">Human Evaluation Study (T1)</p>
            </div>
            <div class="landing-body">
                <p class="description">
                    Welcome! Please select a sport to begin. For each item you'll compare a
                    model-generated caption against the ground-truth caption and rate the
                    alignment across seven dimensions.
                </p>
                <div class="sport-buttons">
                    <a href="start.html?sport=basketball" class="btn btn-sport btn-basketball">Basketball</a>
                    <a href="start.html?sport=hockey" class="btn btn-sport btn-hockey">Hockey</a>
                    <a href="start.html?sport=soccer" class="btn btn-sport btn-soccer">Soccer</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
